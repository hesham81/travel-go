name: travel_go
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  bot_toast: ^4.1.3
  flutter_easyloading: ^3.0.5
  skeletonizer: ^1.4.3
  cloud_firestore: ^5.6.2
  email_otp: ^3.0.2
  lottie: ^3.3.1
  google_sign_in: ^6.2.2
  phone_form_field: ^10.0.4
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  flutter_swipe_action_cell: ^3.1.5
  supabase: ^2.6.2
  supabase_flutter: ^2.8.3
  image_picker: ^1.1.2
  dropdown_button2: ^2.3.9
  country_state_city_picker: ^1.2.8
  chips_choice: ^3.0.1
  country_picker: ^2.0.27
  flutter_awesome_select_clone: ^7.5.0
  easy_stepper: ^0.8.5+1
  roundcheckbox: ^2.0.5
#  flutter_credit_card: #
  debit_credit_card_widget:
  flutter_masked_text2: ^0.9.1
  flutter_multi_formatter: ^2.13.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/files/
    - assets/images/places/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
